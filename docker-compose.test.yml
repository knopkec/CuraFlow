services:
  mysql:
    image: mysql:8.4
    container_name: curaflow-test-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${TEST_MYSQL_ROOT_PASSWORD:?TEST_MYSQL_ROOT_PASSWORD is required}
      MYSQL_DATABASE: curaflow_test_master
      MYSQL_USER: ${TEST_MYSQL_USER:-curaflow}
      MYSQL_PASSWORD: ${TEST_MYSQL_PASSWORD:?TEST_MYSQL_PASSWORD is required}
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s
    ports:
      - "33306:3306"
    volumes:
      - curaflow-test-mysql-data:/var/lib/mysql

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile.test
    container_name: curaflow-test-backend
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      NODE_ENV: test
      PORT: 3000
      JWT_SECRET: ${TEST_JWT_SECRET:?TEST_JWT_SECRET is required}
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: curaflow_test_master
      MYSQL_USER: ${TEST_MYSQL_USER:-curaflow}
      MYSQL_PASSWORD: ${TEST_MYSQL_PASSWORD:?TEST_MYSQL_PASSWORD is required}
      MYSQL_ROOT_PASSWORD: ${TEST_MYSQL_ROOT_PASSWORD:?TEST_MYSQL_ROOT_PASSWORD is required}
      TEST_TENANT_ID: tenant-main
      TEST_TENANT_NAME: CuraFlow Test Tenant
      TEST_TENANT_DATABASE: curaflow_test_tenant
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:?SEED_ADMIN_PASSWORD is required}
      SEED_USER_PASSWORD: ${SEED_USER_PASSWORD:?SEED_USER_PASSWORD is required}
      SEED_READONLY_PASSWORD: ${SEED_READONLY_PASSWORD:?SEED_READONLY_PASSWORD is required}
      FRONTEND_URL: http://localhost:5173
      ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173,http://localhost:3100
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/health').then((res)=>process.exit(res.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s
    ports:
      - "3100:3000"

volumes:
  curaflow-test-mysql-data:
