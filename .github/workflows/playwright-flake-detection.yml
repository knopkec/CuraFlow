name: Playwright Flake Detection

on:
  schedule:
    - cron: '17 2 * * *'
  workflow_dispatch:

permissions:
  contents: read
  actions: write

concurrency:
  group: playwright-flake-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repeat-each:
    name: playwright-repeat-each
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            server/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install server dependencies
        run: npm --prefix server ci

      - name: Generate test harness environment
        shell: bash
        run: |
          echo "TEST_MYSQL_ROOT_PASSWORD=$(openssl rand -hex 16)" >> "$GITHUB_ENV"
          echo "TEST_MYSQL_PASSWORD=$(openssl rand -hex 16)" >> "$GITHUB_ENV"
          echo "TEST_JWT_SECRET=$(openssl rand -hex 32)" >> "$GITHUB_ENV"
          echo "SEED_ADMIN_PASSWORD=$(openssl rand -hex 16)" >> "$GITHUB_ENV"
          echo "SEED_USER_PASSWORD=$(openssl rand -hex 16)" >> "$GITHUB_ENV"
          echo "SEED_READONLY_PASSWORD=$(openssl rand -hex 16)" >> "$GITHUB_ENV"

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox

      - name: Run repeated Playwright suite
        run: npm run test:e2e:repeat

      - name: Publish flake triage note
        if: always()
        shell: bash
        run: |
          {
            echo "## Playwright flake detection"
            echo
            echo "- Command: \`npm run test:e2e:repeat\`"
            echo "- If a test fails intermittently, track it with the \`flaky-tests\` label in GitHub."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-flake-artifacts-${{ github.run_id }}
          path: |
            playwright-report/
            test-results/
          if-no-files-found: warn
