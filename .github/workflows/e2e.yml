name: E2E

on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: e2e-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            server/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install server dependencies
        run: npm --prefix server ci

      - name: Generate test harness environment
        shell: bash
        run: |
          echo "TEST_MYSQL_ROOT_PASSWORD=$(openssl rand -hex 16)" >> "$GITHUB_ENV"
          echo "TEST_MYSQL_PASSWORD=$(openssl rand -hex 16)" >> "$GITHUB_ENV"
          echo "TEST_JWT_SECRET=$(openssl rand -hex 32)" >> "$GITHUB_ENV"
          echo "SEED_ADMIN_PASSWORD=$(openssl rand -hex 16)" >> "$GITHUB_ENV"
          echo "SEED_USER_PASSWORD=$(openssl rand -hex 16)" >> "$GITHUB_ENV"
          echo "SEED_READONLY_PASSWORD=$(openssl rand -hex 16)" >> "$GITHUB_ENV"

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox

      - name: Run E2E smoke suite
        run: npm run test:e2e

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts-${{ github.run_id }}
          path: |
            playwright-report/
            test-results/
          if-no-files-found: warn
